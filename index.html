<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folkets Ölmätare™</title>

<style>
    .dashboard{
    width:90%;
    max-width:1400px;
    margin:0 auto; 
    position:relative;

    background:rgba(0,0,0,0.75);
    border:2px solid #2cff00;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 25px rgba(44,255,0,.4);
}

body{
    margin:0;
    overflow:hidden;
    background:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
  url("https://images.unsplash.com/photo-1514933651103-005eec06c04b");

background-size:cover;
background-position:center;
background-attachment:fixed;

    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.header{
    padding:10px;
    font-size:60px;
    font-weight:bold;
}
.logo{
    max-width:275px;
    width:50%;
    height:auto;
}
    
.sub{
    font-size:30px;
    font-weight:900;
    letter-spacing:4px;
    text-transform:uppercase;
    color:#ffcc66;
    text-shadow:0 0 15px rgba(255,204,102,0.8);
}

.liters{
    font-size:120px;
    font-weight:bold;
    margin-top:20px;
}

.price{
    font-size:150px;
    font-weight:bold;
    color:#5eff5e;
    text-shadow:
        0 0 2px rgba(94,255,94,.4);
}


.next{
    font-size:30px;
    margin-top:20px;
}

.bar{
    width:80%;
    height:40px;
    background:#333;
    margin:30px auto;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:linear-gradient(
90deg,
#39ff14,
#00ff88
);

    width:0%;
}
.price-steps{
    position:absolute;
    top:100px;
    right:30px;
    text-align:right;
    background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
}

.clock{
    position:absolute;
    top:20px;
    right:30px;
    font-size:28px;
}
.price-steps h3{
    font-size:32px;
    font-weight:900;
    letter-spacing:2px;
    color:#ffffff;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.price-steps h3{
    margin-bottom:15px;
}

.active-price{
    color:#39ff14;
    font-weight:bold;
    text-shadow:0 0 8px #39ff14;
}

.footer{
    margin-top:40px;
    font-size:22px;
    opacity:0.8;
}
</style>

</head>
<body>
<div class="dashboard">
<div class="price-steps">
    <h3>PRISSTEGE</h3>

<div>49 kr</div>
<div>46 kr</div>
<div>42 kr</div>
<div>39 kr</div>
</div>


<div class="clock" id="clock"></div>

<div class="header">
    <img src="logo.png.png" alt="Folkets" class="logo">
</div>

<div class="sub">SÅLDA STARKÖL IDAG</div>

<div class="liters" id="total">0</div>

<div class="sub">PRIS JUST NU</div>

<div class="price" id="price">49 KR</div>

<div class="next" id="next">0 kvar till nästa nivå</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="footer">
49 kr → 46 kr → 42 kr → 39 kr
</div>

<script>

function updateClock(){
 document.getElementById("clock").innerHTML =
 new Date().toLocaleTimeString('sv-SE');
}

setInterval(updateClock,1000);
updateClock();

async function updateScreen(){

const response = await fetch("https://script.google.com/macros/s/AKfycbz3ZKEe9C0M7TpyrlWdsOW2vPKYmmeY1awa5_DCue8IpRqf6j8ippRB1T_vxtDIMZRt/exec");
const data = await response.json();

  let total = data.total;
  let price = data.pris;
  let kvar = data.kvar;


 document.getElementById("total").innerHTML = total + " ST";
 document.getElementById("price").innerHTML = price + " KR";
document.getElementById("next").innerHTML =
kvar + " öl kvar till 39 kr";

    
document.querySelectorAll(".price-steps div").forEach(el => {
    el.classList.remove("active-price");
});

if(price == 49){
    document.querySelector(".price-steps div:nth-child(2)").classList.add("active-price");
}
else if(price == 46){
    document.querySelector(".price-steps div:nth-child(3)").classList.add("active-price");
}
else if(price == 42){
    document.querySelector(".price-steps div:nth-child(4)").classList.add("active-price");
}
else if(price == 39){
    document.querySelector(".price-steps div:nth-child(5)").classList.add("active-price");
}

let progress = (total / 300) * 100;


 if(progress > 100){
     progress = 100;
 }

 document.getElementById("fill").style.width =
 progress + "%";
}

updateScreen();
setInterval(updateScreen, 10000);

</script>
</div>
</body>
</html>
